name: Validate Renovate configs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Validate JSON configs
        run: npx --package=renovate@43 renovate-config-validator --no-global --strict *.json
